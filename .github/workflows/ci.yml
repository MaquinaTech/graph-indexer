name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["18", "20"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf-8'))" && echo "✓ package.json is valid JSON"

      - name: Verify MIT license
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf-8'));
            if (pkg.license !== 'MIT') { console.error('✗ License must be MIT, got: ' + pkg.license); process.exit(1); }
            console.log('✓ License: MIT');
          "
          grep -q 'MIT License' LICENSE && echo '✓ LICENSE file OK'

      - name: Verify required files
        run: |
          for file in core-engine.mjs parser-utils.mjs indexer.mjs watch-daemon.mjs mcp-server.mjs init.mjs PROMPT.md README.md LICENSE; do
            [ -f "$file" ] && echo "✓ $file exists" || (echo "✗ $file missing"; exit 1)
          done

      - name: Verify supported languages
        run: |
          # Verify LANGUAGE_MAP includes all required extensions
          grep -q "'.ts': TypeScript.typescript" parser-utils.mjs && echo "✓ TypeScript support"
          grep -q "'.js': JavaScript" parser-utils.mjs && echo "✓ JavaScript support"
          grep -q "'.py': Python" parser-utils.mjs && echo "✓ Python support"
          grep -q "'.rs': Rust" parser-utils.mjs && echo "✓ Rust support"
          grep -q "'.go': Go" parser-utils.mjs && echo "✓ Go support"
          grep -q "'.php': PHP" parser-utils.mjs && echo "✓ PHP support"
          grep -q "'.java': Java" parser-utils.mjs && echo "✓ Java support"
          grep -q "'.kt': Kotlin" parser-utils.mjs && echo "✓ Kotlin support"
          grep -q "'.cs': CSharp" parser-utils.mjs && echo "✓ C# support"
          grep -q "'.rb': Ruby" parser-utils.mjs && echo "✓ Ruby support"
          grep -q "'.css': CSS" parser-utils.mjs && echo "✓ CSS support"
          echo "✓ All 11 languages verified"

      - name: Unit tests (pure helpers, no fixtures)
        run: npm run test:unit

      - name: Build index on this codebase
        run: |
          INDEXER_EMBEDDINGS=off node indexer.mjs --repo .
        env:
          INDEXER_EMBEDDINGS: "off"

      - name: Setup test fixtures
        run: |
          node test/setup.mjs

      - name: Lexical-only tests (no Ollama)
        run: |
          INDEXER_EMBEDDINGS=off npm test
        env:
          INDEXER_EMBEDDINGS: "off"

      - name: Verify index files created
        run: |
          [ -f code-index.json ] && echo "✓ code-index.json created" || (echo "✗ code-index.json missing"; exit 1)
